<svg xmlns="http://www.w3.org/2000/svg" width="420" height="594" viewBox="0 0 420 594" role="img" aria-label="Classic resume template preview">
  <rect width="420" height="594" fill="#f8fafc"/>
  <rect x="42" y="28" width="336" height="538" rx="4" fill="#ffffff" stroke="#e2e8f0"/>
